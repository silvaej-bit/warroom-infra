name: CI - Backend OCI (Java 21 + Maven)

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: '17'
      dockerfile:
        required: false
        type: string
        default: Dockerfile_backend_java21
      image-name:
        required: true
        type: string
    secrets:
      INFRA_TOKEN:
        description: 'PAT com acesso ao repo privado warroom-infra'
        required: true

env:
  INFRA_REPO: silvaej-bit/warroom-infra
  DOCKERFILES_PATH: dockerfiles

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout warroom-infra (Dockerfiles + infra)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_TOKEN }}
          path: .infra

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - name: Build & Test
        run: mvn clean verify -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push (amd64 + arm64)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .infra/${{ env.DOCKERFILES_PATH }}/${{ inputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
