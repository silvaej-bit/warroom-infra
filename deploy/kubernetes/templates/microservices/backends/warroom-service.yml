# warroom-service — Helm template values
# Copiar para: kubernetes/templates/microservices/backends/warroom-service.yml
app:
  name: warroom-service
  port: 8080
  healthPath: /actuator/health
  contextPath: /

image:
  name: warroom-service

env:
  - name: SERVER_PORT
    value: "8080"
  - name: SPRING_PROFILES_ACTIVE
    valueFrom:
      configMapKeyRef:
        name: weeeeeekend-config
        key: SPRING_PROFILES_ACTIVE
  - name: WARROOM_DB_URL
    valueFrom:
      secretKeyRef:
        name: weeeeeekend-secrets
        key: WARROOM_DB_URL
  - name: WARROOM_DB_USER
    valueFrom:
      secretKeyRef:
        name: weeeeeekend-secrets
        key: WARROOM_DB_USER
  - name: WARROOM_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: weeeeeekend-secrets
        key: WARROOM_DB_PASSWORD
